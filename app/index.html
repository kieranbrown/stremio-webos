<!doctype html>
<html>
<head><meta charset="UTF-8"><title>Stremio</title></head>
<body style="background:#0c0b11;margin:0;display:flex;align-items:center;justify-content:center;height:100vh">
<div style="color:rgba(255,255,255,0.6);font-family:sans-serif;font-size:24px">Loading Stremio...</div>
<script>
function redirect() { location.href = 'http://127.0.0.1:8080/'; }

function callStart() {
    var bridge = new PalmServiceBridge();
    bridge.onservicecallback = function(response) {
        var data = JSON.parse(response);
        if (data.ready) redirect();
    };
    bridge.call('luna://io.strem.tv.server/start', '{}');
}

// Start the service, retry every 5s if the callback doesn't fire
// (e.g. service was killed by idle timer before it could respond)
callStart();
setInterval(callStart, 5000);
</script>
</body>
</html>

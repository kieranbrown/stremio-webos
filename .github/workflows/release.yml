name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in appinfo.json
        run: jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' app/appinfo.json > tmp.json && mv tmp.json app/appinfo.json

      - name: Install ares-cli
        run: npm i -g @webosose/ares-cli

      - name: Build
        run: make build

      - name: Package
        run: make package

      - name: Generate manifest
        run: |
          IPK="io.strem.tv_${{ steps.version.outputs.version }}_all.ipk"
          SHA256=$(sha256sum "$IPK" | cut -d' ' -f1)
          SIZE=$(stat --format=%s "$IPK")
          cat > manifest.json << EOF
          {
            "id": "io.strem.tv",
            "version": "${{ steps.version.outputs.version }}",
            "type": "web",
            "title": "Stremio",
            "iconUri": "https://raw.githubusercontent.com/${{ github.repository }}/main/app/icon.png",
            "sourceUrl": "https://github.com/${{ github.repository }}",
            "rootRequired": false,
            "ipkUrl": "$IPK",
            "ipkHash": {
              "sha256": "$SHA256"
            },
            "ipkSize": $SIZE
          }
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            io.strem.tv_${{ steps.version.outputs.version }}_all.ipk
            manifest.json
